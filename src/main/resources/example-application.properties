spring.application.name=electricity consumption
server.port=5000
spring.datasource.url=jdbc:postgresql://localhost:5432/Electricity_Usage_db
#(for docker setup)
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/Task_Pilot_db 
spring.datasource.username=postgres
spring.datasource.password=your_password


# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Corrected Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.session.jdbc.initialize-schema=always
spring.session.store-type=jdbc
spring.session.jdbc.platform=postgresql